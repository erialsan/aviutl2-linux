; システムの設定
; UTF-8で記述する
; ProgramData\aviutl2\system.confで設定を上書き出来る

[Config]
; INIファイルキャッシュの最大値(設定項目数)
IniFileCacheSize=65536
; 一時画像キャッシュの最大値(総ドット数) ※スクリプトの仮想バッファ等
TemporaryImageCacheSize=16000000
; シャドウバッファのサイズ(縦横ドット数)
ShadowBufferSize=2048
; スレッドの優先度設定 (SetThreadPriorityの設定値)
MainThreadPriority=2
WorkerThreadPriority=2
; Direct3Dで利用するピクセルフォーマット(DXGI_FORMAT) ※DXGI_FORMAT_R16G16B16A16_FLOAT = 10
PixelFormat=10
; Direct3Dで利用するマスクのピクセルフォーマット(DXGI_FORMAT) ※DXGI_FORMAT_A8_UNORM = 65
MaskFormat=65
; プレビュー表示の拡大率リスト ※0=WindowSize
PreviewZoom=0,25,50,100,200,300,400,800
; プレビューの再生速度リスト
PreviewSpeed=100,120,150,200,300,500,800
; 解像度設定リスト
Resolution=3840*2160,2560*1440,1920*1080,1280*720,1024*768,640*480,320*240
; フレームレート設定リスト
FrameRate=120,119.88,60,59.94,30,29.97,24,23.976,15,12,10
; サンプリングレート設定リスト
SampleRate=96000,88200,48000,44100,32000,24000,16000,8000
; 拒否する外部モジュール(プラグイン・スクリプト)ファイルリスト (all=全て拒否)
;RejectModule=xxx.aux2|xxx.anm2

; 特殊フレームレート定義 (表示値=rate/scale)
[FrameRate]
119.88=120000/1001
59.94=60000/1001
29.97=30000/1001
23.976=24000/1001
14.985=15000/1001
11.988=12000/1001

; RGB->YUV変換係数 (名称,自動選択対象の高さ,変換マトリクス[9])
[RGB2YUV]
0=BT.601,0,0.299,0.587,0.114,-0.169,-0.331,0.5,0.5,-0.419,-0.081
1=BT.709,720,0.2126,0.7152,0.0722,-0.1146,-0.3854,0.5,0.5,-0.4542,-0.0458
2=BT.2020,2160,0.2627,0.678,0.0593,-0.13963,-0.36037,0.5,0.5,-0.45979,-0.04021

; YUV->RGB変換係数 (名称,自動選択対象の高さ,変換マトリクス[9])
[YUV2RGB]
0=BT.601,0,1,1.402,0,1,-0.714,-0.344,1,0,1.772
1=BT.709,720,1,1.5748,0,1,-0.4681,-0.1873,1,0,1.8556
2=BT.2020,2160,1,1.4746,0,1,-0.57135,-0.16455,1,0,1.8814

; ショットカットキーの追加更新定義 (仮想キーコード=表示名)
[KeyCode]
189=-
222=^
220=￥
192=@
219=[
187=;
186=:
221=]
188=,
190=.
191=/
226=＼

; プリセットの除外項目の初期値
[PresetExclude]
映像再生=X|Y|Z|中心X|中心Y|中心Z|X軸回転|Y軸回転|Z軸回転|拡大率|縦横比|透明度|合成モード|音量
標準描画=X|Y|Z|中心X|中心Y|中心Z|X軸回転|Y軸回転|Z軸回転|拡大率|縦横比|透明度|合成モード
音声再生=音量|左右
テキスト=表示速度|文字揃え|テキスト|文字毎に個別オブジェクト|自動スクロール|移動座標上に表示|オブジェクトの長さを自動調節
